<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="vyCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFBEF"/>
      <stop offset="60%" stop-color="#FFE7B0"/>
      <stop offset="100%" stop-color="#F5C26A"/>
    </radialGradient>
    <radialGradient id="vyRays" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFD37A" stop-opacity="1"/>
      <stop offset="65%" stop-color="#E07B2E" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#B84610" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vyLetter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8361A"/>
      <stop offset="100%" stop-color="#7A2B14"/>
    </linearGradient>
  </defs>

  <!-- soft radial glow -->
  <circle cx="100" cy="100" r="98" fill="url(#vyRays)" opacity=".55"/>

  <!-- 12-pointed starburst -->
  <g transform="translate(100 100)">
    <g fill="url(#vyCore)" stroke="#E07B2E" stroke-width=".8" stroke-linejoin="round">
      <!-- big star points -->
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(0)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(30)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(60)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(90)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(120)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(150)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(180)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(210)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(240)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(270)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(300)"/>
      <polygon points="0,-88 10,-38 -10,-38" transform="rotate(330)"/>
    </g>
    <g fill="#FFD880" opacity=".9">
      <!-- small rays between -->
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(15)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(45)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(75)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(105)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(135)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(165)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(195)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(225)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(255)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(285)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(315)"/>
      <polygon points="0,-70 5,-40 -5,-40" transform="rotate(345)"/>
    </g>
  </g>

  <!-- inner circle / letter plate -->
  <circle cx="100" cy="100" r="44" fill="url(#vyCore)" stroke="#E07B2E" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="44" fill="none" stroke="#FFF7E2" stroke-width="1" opacity=".7" transform="scale(.9) translate(11 11)"/>

  <!-- Devanagari letter अ -->
  <text x="100" y="122" text-anchor="middle"
        font-family="'Cormorant Garamond','Noto Sans Devanagari','Mangal',serif"
        font-size="70" font-weight="700"
        fill="url(#vyLetter)">अ</text>
</svg>
